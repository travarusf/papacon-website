document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

      <div style=\"background: rgba(242,237,228,0.05); border-top: 3px solid #D4837A; border-radius: 4px; padding: 24px;\">\n            <div style=\"font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #F2EDE4; margin-bottom: 8px;\">{{ f.name }}<\u002Fdiv>\n            <div style=\"font-family: 'DM Mono', monospace; font-size: 12.5px; color: #C9B99A; line-height: 1.55;\">{{ f.desc }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ SPONSORS ============ -->\n  <section data-screen-label=\"Sponsors\" style=\"padding: 100px 40px; background: #F2EDE4;\">\n    <div style=\"max-width: 1100px; margin: 0 auto; text-align: center;\">\n      <div style=\"font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: #2C1810; opacity: 0.5; font-weight: 700; margin-bottom: 24px;\">Made possible with<\u002Fdiv>\n      <div style=\"display: flex; gap: 14px; justify-content: center; flex-wrap: wrap;\">\n        <sc-for list=\"{{ sponsorNames }}\" as=\"sp\" hint-placeholder-count=\"5\">\n          <div style=\"background: #2C1810; color: #F2EDE4; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 10px 22px; border-radius: 20px;\">{{ sp }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"font-family: 'DM Mono', monospace; font-size: 11px; color: #2C1810; opacity: 0.5; margin-top: 20px;\">Sponsorship opportunities available — contact us.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ REGISTER ============ -->\n  <section id=\"register\" data-screen-label=\"Register\" ref=\"{{ registerRef }}\" style=\"padding: 140px 40px 160px; background: #C9B99A;\">\n    <div style=\"max-width: 560px; margin: 0 auto;\">\n\n      <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align: center; margin-bottom: 40px;\">\n          <div style=\"font-family: 'Syne', sans-serif; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #D4837A; font-weight: 700; margin-bottom: 16px;\">Reserve Your Seat<\u002Fdiv>\n          <div style=\"font-family: 'Instrument Serif', serif; font-size: 38px; font-weight: 400; color: #2C1810;\">100 spots. Free. First come, first in the room.<\u002Fdiv>\n        <\u002Fdiv>\n        <form onsubmit=\"{{ onSubmit }}\" style=\"background: #F2EDE4; border-radius: 10px; padding: 40px; display: flex; flex-direction: column; gap: 18px;\">\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <label style=\"font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #2C1810; opacity: 0.6;\">Name<\u002Flabel>\n            <input type=\"text\" required=\"true\" placeholder=\"Your name\" value=\"{{ name }}\" onchange=\"{{ onNameChange }}\" style=\"font-family: 'DM Mono', monospace; font-size: 15px; padding: 14px 16px; border-radius: 6px; border: 1px solid #C9B99A; background: #ffffff; color: #2C1810;\">\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 6px;\">\n            <label style=\"font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #2C1810; opacity: 0.6;\">Email<\u002Flabel>\n            <input type=\"email\" required=\"true\" placeholder=\"you@email.com\" value=\"{{ email }}\" onchange=\"{{ onEmailChange }}\" style=\"font-family: 'DM Mono', monospace; font-size: 15px; padding: 14px 16px; border-radius: 6px; border: 1px solid #C9B99A; background: #ffffff; color: #2C1810;\">\n          <\u002Fdiv>\n          <button type=\"submit\" style=\"margin-top: 8px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: #2C1810; background: #D4837A; padding: 16px; border-radius: 8px; border: none; cursor: pointer; letter-spacing: 0.02em;\">Reserve My Seat<\u002Fbutton>\n          <div style=\"font-family: 'DM Mono', monospace; font-size: 12px; color: #2C1810; opacity: 0.5; text-align: center;\">Registration is mocked up — no data is stored.<\u002Fdiv>\n        <\u002Fform>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align: center; margin-bottom: 28px;\">\n          <div style=\"font-family: 'Syne', sans-serif; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; color: #D4837A; font-weight: 700; margin-bottom: 12px;\">You're In<\u002Fdiv>\n          <div style=\"font-family: 'Instrument Serif', serif; font-size: 30px; font-weight: 400; color: #2C1810;\">Share it. Bring another father with you.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background: #2C1810; border-radius: 14px; padding: 44px; display: flex; flex-direction: column; gap: 24px; aspect-ratio: 4/5; max-width: 380px; margin: 0 auto;\">\n          <div style=\"display: inline-flex; align-items: baseline; align-self: center;\">\n            <span style=\"font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; letter-spacing: -0.02em; color: #F2EDE4;\">PAPA<\u002Fspan>\n            <span style=\"font-family: 'Syne', sans-serif; font-weight: 800; font-size: 8px; background: #D4837A; color: #2C1810; padding: 2px 6px; border-radius: 8px; margin-left: -2px; transform: translateY(-10px);\">CON<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px;\">\n            <div style=\"font-family: 'Syne', sans-serif; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #C9B99A; font-weight: 700;\">I'm Going<\u002Fdiv>\n            <div style=\"font-family: 'Instrument Serif', serif; font-size: 32px; color: #F2EDE4;\">{{ name }}<\u002Fdiv>\n            <div style=\"font-family: 'Syne', sans-serif; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #D4837A; font-weight: 700; margin-top: 4px;\">Group {{ group }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"text-align: center; border-top: 1px solid rgba(242,237,228,0.15); padding-top: 18px;\">\n            <div style=\"font-family: 'DM Mono', monospace; font-size: 12px; color: #C9B99A;\">Oct 3, 2026 · Rider University<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display: flex; gap: 12px; justify-content: center; margin-top: 28px;\">\n          <div style=\"background: #F2EDE4; border: 1px solid #b8a583; color: #2C1810; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 12px 20px; border-radius: 20px;\">Share to Story<\u002Fdiv>\n          <div style=\"background: #F2EDE4; border: 1px solid #b8a583; color: #2C1810; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; padding: 12px 20px; border-radius: 20px;\">Copy Link<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"text-align: center; margin-top: 24px;\">\n          <span onclick=\"{{ onReset }}\" style=\"font-family: 'DM Mono', monospace; font-size: 12px; color: #2C1810; opacity: 0.55; text-decoration: underline; cursor: pointer;\">register another father<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FOOTER ============ -->\n  <div style=\"background: #2C1810; padding: 32px 40px; display: flex; flex-direction: {{ footerDirection }}; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;\">\n    <div style=\"font-family: 'DM Mono', monospace; font-size: 12px; color: rgba(242,237,228,0.4);\">PapaCon · 2026<\u002Fdiv>\n    <div style=\"font-family: 'Instrument Serif', serif; font-style: italic; font-size: 15px; color: #D4837A;\">Come as a father, leave as a better one.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ FLOATING CTA ============ -->\n  <sc-if value=\"{{ showFab }}\" hint-placeholder-val=\"{{ false }}\">\n    <a href=\"#register\" style=\"position: fixed; bottom: 24px; right: 24px; z-index: 100; background: #D4837A; color: #2C1810; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; padding: 14px 24px; border-radius: 24px; text-decoration: none; box-shadow: 0 4px 16px rgba(44,24,16,0.25);\">Register Free<\u002Fa>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { name: '', email: '', submitted: false, group: null, isMobile: false, showFab: false };\n\n  componentDidMount() {\n    this._timer = setInterval(() => this.forceUpdate(), 60000);\n\n    this._mq = window.matchMedia('(max-width: 768px)');\n    this._updateMQ = () => this.setState({ isMobile: this._mq.matches });\n    this._updateMQ();\n    this._mq.addEventListener('change', this._updateMQ);\n\n    this._heroVisible = true;\n    this._registerVisible = false;\n    this._observer = new IntersectionObserver((entries) => {\n      entries.forEach((entry) => {\n        if (entry.target === this._heroEl) this._heroVisible = entry.isIntersecting;\n        if (entry.target === this._registerEl) this._registerVisible = entry.isIntersecting;\n      });\n      this.setState({ showFab: !this._heroVisible && !this._registerVisible });\n    }, { threshold: 0.15 });\n    if (this._heroEl) this._observer.observe(this._heroEl);\n    if (this._registerEl) this._observer.observe(this._registerEl);\n  }\n\n  componentWillUnmount() {\n    clearInterval(this._timer);\n    if (this._mq) this._mq.removeEventListener('change', this._updateMQ);\n    if (this._observer) this._observer.disconnect();\n  }\n\n  setHeroRef = (el) => { this._heroEl = el; };\n  setRegisterRef = (el) => { this._registerEl = el; };\n\n  handleSubmit = (e) => {\n    e.preventDefault();\n    if (!this.state.name.trim() || !this.state.email.trim()) return;\n    const groups = ['A', 'B', 'C', 'D'];\n    const group = groups[Math.floor(Math.random() * groups.length)];\n    this.setState({ submitted: true, group });\n  };\n\n  renderVals() {\n    const eventDate = new Date('2026-10-03T09:00:00');\n    const now = new Date();\n    const diffMs = Math.max(0, eventDate - now);\n    const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));\n    const hours = Math.floor((diffMs / (1000 * 60 * 60)) % 24);\n\n    const isMobile = this.state.isMobile;\n\n    return {\n      name: this.state.name,\n      group: this.state.group,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      days,\n      hours,\n      isMobile,\n      showFab: this.state.showFab,\n      heroRef: this.setHeroRef,\n      registerRef: this.setRegisterRef,\n      navLinksDisplay: isMobile ? 'none' : 'flex',\n      heroTitleSize: 'clamp(2.25rem, 13vw, 8rem)',\n      heroConSize: isMobile ? '13px' : '28px',\n      heroConOffset: isMobile ? 'translateY(-34px)' : 'translateY(-50px)',\n      heroPadding: isMobile ? '60px 1rem' : '60px 40px',\n      seminarGridCols: isMobile ? '1fr' : 'repeat(2, 1fr)',\n      portraitGridCols: isMobile ? '1fr' : 'repeat(2, 1fr)',\n      fairGridCols: isMobile ? '1fr' : 'repeat(3, 1fr)',\n      footerDirection: isMobile ? 'column' : 'row',\n      onNameChange: (e) => this.setState({ name: e.target.value }),\n      onEmailChange: (e) => this.setState({ email: e.target.value }),\n      onSubmit: this.handleSubmit,\n      onReset: () => this.setState({ submitted: false, name: '', email: '', group: null }),\n      marqueeItems: [\n        'Presence over perfection',\n        'Brotherhood as infrastructure',\n        'Legacy is built now',\n        'Hold the full story',\n      ],\n      portraits: [\n        { title: 'The first-time dad', body: 'Figuring it out as he goes, no playbook, showing up anyway.' },\n        { title: 'The man who grew up without a father', body: 'Building something he never had as a model.' },\n        { title: 'The grandfather', body: 'Everything he learned the hard way, looking for someone to pass it to.' },\n        { title: 'The active dad', body: 'In it every day, looking for a room where that\\'s the standard.' },\n      ],\n      seminars: [\n        { num: '01', name: 'The Weight', desc: 'What fathers carry, out loud.', quote: 'You\\'ve been carrying this longer than you think.', bg: '#EDE5D8' },\n        { num: '02', name: 'The Blueprint', desc: 'Fathering beyond what you were given.', quote: 'What you keep. What you leave behind. What you build.', bg: '#E8DFCC' },\n        { num: '03', name: 'The Relationship', desc: 'Co-parenting, partnership, keeping it together.', quote: 'The people watching you figure it out.', bg: '#F2EDE4' },\n        { num: '04', name: 'The Network', desc: 'Building brotherhood on purpose.', quote: 'The fathers in this room are your resource.', bg: '#EDE5D8' },\n      ],\n      fairCategories: [\n        { name: 'Legal Rights', desc: 'Know what you\\'re entitled to as a father.' },\n        { name: 'Co-Parenting Support', desc: 'Tools for navigating shared custody with intention.' },\n        { name: 'Maternal and Infant Health', desc: 'Resources for expecting and new fathers.' },\n        { name: 'Financial Literacy', desc: 'Budgeting, insurance, and planning for your family.' },\n        { name: 'Mental Health', desc: 'Providers who work specifically with fathers.' },\n        { name: 'Community Organizations', desc: 'Local NJ nonprofits built around family.' },\n      ],\n      sponsorNames: ['UIH Family Partners', 'The Father Center', 'Aisles', 'Hey Black Dad', 'NJ Maternal and Infant Health'],\n      schedule: [\n        { time: '9:00', event: 'Doors open — registration & Fatherhood Fair' },\n        { time: '9:45', event: 'Opening remarks' },\n        { time: '10:15', event: 'Rotation 1' },\n        { time: '11:05', event: 'Rotation 2' },\n        { time: '11:55', event: 'Rotation 3' },\n        { time: '12:45', event: 'Rotation 4' },\n        { time: '1:30', event: 'Lunch, full room' },\n        { time: '2:15', event: 'Fringe sessions (self-select)' },\n        { time: '3:00', event: 'Close — The Network' },\n      ],\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
